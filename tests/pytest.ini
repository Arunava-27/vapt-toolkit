[pytest]
# Pytest configuration for VAPT toolkit

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: mark test as integration test
    asyncio: mark test as async test
    slow: mark test as slow running
    security: mark test as security-related
    unit: mark test as unit test
    api: mark test as API endpoint test
    db: mark test as database test

# Coverage options
addopts = 
    --strict-markers
    --strict-config
    --cov=scanner
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=80
    --asyncio-mode=auto

asyncio_mode = auto
timeout = 300
